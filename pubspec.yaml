name: jala_as
description: Jala Success - Account Statement Management App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Localization (REQUIRED for date picker)
  flutter_localizations:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Database
  supabase_flutter: ^2.3.4
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  flutter_launcher_icons: ^0.14.4
  pin_code_fields: ^8.0.1
  uuid: ^4.5.1

  sqflite: ^2.3.0                    # Local database
  device_info_plus: ^9.1.1            # Device identification
  crypto: ^3.0.3                      # Security (hashing)
  path: ^1.8.3                        # File paths
  
  # Excel handling
  excel: ^4.0.6
  syncfusion_flutter_xlsio: ^29.1.38
  
  # Image & File handling
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  
  # Web specific
  universal_html: ^2.2.4
  
  # Platform specific
  flutter_web_plugins:
    sdk: flutter
  share_plus: ^12.0.1
  photo_view: ^0.15.0
  file_picker: ^10.3.3
  firebase_messaging: ^16.0.4
  firebase_core: ^4.2.1
  flutter_local_notifications: ^18.0.1  # ADD THIS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Remove get from dev_dependencies as it should be in dependencies if used
  # get: ^4.7.2

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#1E6B7F"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  
  # Generate localization files
  generate: true
  
  assets:
    - assets/images/
    - assets/fonts/
  
  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700